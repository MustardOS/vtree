[General]
ShowHidden=false
RememberDirs=false
ExecScripts=false

[Display]
ScreenWidth=0
ScreenHeight=0
# Display rotation: 0=none, 1=90 CW, 2=180, 3=270 CW
# ScreenWidth/Height store physical (pre-rotation) dimensions.
Rotation=0
FontSizeList=18
FontSizeHeader=18
FontSizeFooter=18
FontSizeMenu=18
FontSizeHex=16
FontFile=

[Paths]
StartDirectoryLeft=/mnt/mmc
StartDirectoryRight=/mnt/mmc
# Path to gamecontrollerdb.txt.  Leave blank to search next to the executable.
GameControllerDB=/usr/lib/gamecontrollerdb.txt

[Keys]
# SDL GameController button names: a, b, x, y, back, start, leftshoulder, rightshoulder, guide
KeyConfirm=a
KeyBack=b
KeyMenu=y
KeyMark=back
KeyPgUp=leftshoulder
KeyPgDn=rightshoulder


[OskKeys]
# On-screen keyboard keys are fully independent from the explorer keys above.
# L1 (leftshoulder) and R1 (rightshoulder) are HARDCODED as caret-left / caret-right
# and cannot be rebound here — they always move the text cursor within the input field.
#
# OskKeyType    — press the highlighted key           (default: a)
# OskKeyBksp   — backspace at text cursor             (default: x)
# OskKeyShift  — cycle layer: abc → ABC → !@#         (default: y)
# OskKeyOk     — confirm / submit the text            (default: start)
# OskKeyCancel — discard and close the OSK            (default: b)
# OskKeyToggle — show / hide the keyboard grid        (default: back)
# OskKeyIns    — toggle Insert / Overwrite mode       (default: misc1 / extra button)
OskKeyType=a
OskKeyBksp=x
OskKeyShift=y
OskKeyOk=misc1
OskKeyCancel=b
OskKeyToggle=back
OskKeyIns=start

[KbdKeys]
# Keyboard input mode — used when vtree is launched with --keyb.
# Enables keyboard-driven navigation for devices that map gamepad buttons
# to keyboard events (e.g. certain handheld consoles) instead of SDL
# GameController events. No gamecontrollerdb.txt is needed in this mode.
#
# Key names use SDL conventions:
#   Letters          : A B C ... Z  (case-insensitive in SDL, stored uppercase)
#   Special keys     : Return  Escape  Space  Tab  Backspace  Insert  Delete
#   Navigation       : Up  Down  Left  Right  PageUp  PageDown  Home  End
#   Function keys    : F1  F2  ... F12
#   Numpad           : KP Enter  KP +  KP -  etc.
#
# The Kbd* keys define which keyboard event is pressed for each action.
# The KbdLabel* values are the physical button markings shown in on-screen hints
# (e.g. "A", "L1").  If a label is blank the raw SDL key name is shown instead.
#
# D-pad is always mapped to the arrow keys and cannot be rebound.
#
# OSK note: the on-screen keyboard uses the same button values as the defaults
# above (A=type, B=cancel, X=backspace, Y=shift, Back=toggle, Start=ins/ovr).
# For devices using --keyb, omit or comment out the [OskKeys] section entirely
# so the built-in defaults are used — they align correctly with the mappings here.
#
# Uncomment and adjust to match your device:
#
# KbdConfirm=Return
# KbdBack=Escape
# KbdMenu=M
# KbdMark=Tab
# KbdPgUp=Page Up
# KbdPgDn=Page Down
# KbdMenu2=F1
# KbdX=Backspace
# KbdStart=Insert
#
# KbdLabelConfirm=A
# KbdLabelBack=B
# KbdLabelMenu=Y
# KbdLabelMark=Select
# KbdLabelPgUp=L1
# KbdLabelPgDn=R1
# KbdLabelMenu2=Guide
# KbdLabelX=X
# KbdLabelStart=Start

[ActiveTheme]
# Name of the theme to activate on startup.
# Must match a [Theme.Name] section in theme.ini.
# If omitted or not found, the first theme found is used.
ActiveTheme=Dark

[FileTypes]
# Extra file extensions appended to the built-in image and text lists.
# Space or comma separated; leading dot is optional.
# Images get res/img.png icon and open directly in the image viewer.
# Text files get res/txt.png icon and open in text/hex chooser.
#
# Built-in image types: png jpg jpeg bmp gif tga tiff tif webp lbm pnm pbm pgm ppm xcf xpm svg
# Built-in text types:  txt md cfg ini conf log lua c h cpp cc py sh bash json xml yaml yml
#                       csv html htm css js ts toml rs go java kt swift rb pl asm s nfo me
#                       readme license makefile cmake diff patch
#
# Examples:
#   ExtraImageExts=.raw .exr .hdr
#   ExtraTextExts=.sub .srt .vtt
ExtraImageExts=
ExtraTextExts=.inf
